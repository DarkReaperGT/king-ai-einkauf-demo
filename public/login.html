<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KING AI Einkauf | Login</title>
  <style>
    :root {
      --bg: #172235;
      --surface: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #dbe3ec;
      --blue: #315f9e;
      --shadow: 0 24px 70px rgba(15, 23, 42, .22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(80, 120, 170, .35), transparent 30%),
        radial-gradient(circle at bottom right, rgba(80, 170, 145, .25), transparent 28%),
        linear-gradient(135deg, #243449, #111827 70%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    main {
      width: min(100%, 480px);
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 30px;
    }
    .badge {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: #eaf1fb;
      color: #1d4ed8;
      font-size: 28px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -.04em;
    }
    p {
      margin: 10px 0 22px;
      color: var(--muted);
      line-height: 1.55;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 900;
      color: #334155;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin: 14px 0 7px;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      outline: none;
      background: #fff;
    }
    input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(147,197,253,.22);
    }
    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      background: linear-gradient(135deg, #3c679f, #284f80);
      color: #fff;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(49, 95, 158, .24);
    }
    .hint {
      margin-top: 18px;
      padding: 13px;
      border: 1px solid #dbeafe;
      background: #eff6ff;
      border-radius: 14px;
      color: #315070;
      font-size: 13px;
      line-height: 1.45;
    }
    code { font-weight: 800; }
  </style>
</head>
<body>
  <main>
    <div class="badge">🔐</div>
    <h1>KING AI Einkauf</h1>
    <p>Geschützter Zugang für den Unternehmenstest. Nach dem Login wird die KI-Anwendung freigeschaltet.</p>

    <form method="post" action="/login" autocomplete="on">
      <label for="username">Benutzername</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus placeholder="unternehmen" />

      <label for="password">Passwort</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Passwort eingeben" />

      <button type="submit">Einloggen</button>
    </form>

    <div class="hint">
      Zugangsdaten stehen in der Datei <code>.env</code>: <code>LOGIN_USERNAME</code> und <code>LOGIN_PASSWORD</code>.
    </div>
  </main>
</body>
</html>
