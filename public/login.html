<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KING AI | Anmeldung</title>
  <style>
    :root {
      --blue: #2f6fed;
      --violet: #6b2fe8;
      --brand-gradient: linear-gradient(135deg, #2f6fed, #6b2fe8);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(47, 111, 237, 0.25) 0, transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(107, 47, 232, 0.28) 0, transparent 45%),
        linear-gradient(160deg, #05070d 0%, #0a0f1f 55%, #0d1526 100%);
      color: #fff;
    }

    .card {
      width: min(92vw, 420px);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 22px;
      padding: 34px 30px;
      backdrop-filter: blur(14px);
      box-shadow: 0 30px 70px rgba(5, 7, 13, 0.55);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: var(--brand-gradient);
      flex: 0 0 46px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 18px;
      box-shadow: 0 14px 30px rgba(107, 47, 232, 0.35);
    }

    .brand h1 {
      margin: 0;
      font-size: 17px;
      letter-spacing: -0.01em;
    }

    .brand p {
      margin: 3px 0 0;
      color: rgba(255, 255, 255, 0.65);
      font-size: 12px;
    }

    h2 {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0 0 24px;
      color: rgba(255, 255, 255, 0.65);
      font-size: 13px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .field { margin-bottom: 16px; }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    input::placeholder { color: rgba(255, 255, 255, 0.35); }

    input:focus {
      border-color: rgba(107, 47, 232, 0.7);
      box-shadow: 0 0 0 4px rgba(107, 47, 232, 0.22);
      background: rgba(255, 255, 255, 0.09);
    }

    button {
      width: 100%;
      margin-top: 6px;
      padding: 13px 14px;
      border: 0;
      border-radius: 12px;
      background: var(--brand-gradient);
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 16px 32px rgba(107, 47, 232, 0.32);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .hint {
      margin-top: 18px;
      font-size: 11.5px;
      color: rgba(255, 255, 255, 0.45);
      line-height: 1.5;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="brand-mark">K</div>
      <div>
        <h1>KING AI Einkauf</h1>
        <p>Unternehmens-Zugang</p>
      </div>
    </div>

    <h2>Anmelden</h2>
    <p class="sub">Bitte melde dich mit den Zugangsdaten aus der <code>.env</code>-Konfiguration an, um die Einkaufsanalyse zu öffnen.</p>

    <form method="post" action="/login">
      <div class="field">
        <label for="username">Benutzername</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="unternehmen" required autofocus />
      </div>
      <div class="field">
        <label for="password">Passwort</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <button type="submit">Anmelden</button>
    </form>

    <p class="hint">Zugangsdaten vergessen oder ändern? Trage neue Werte in <code>LOGIN_USERNAME</code> / <code>LOGIN_PASSWORD</code> in der <code>.env</code>-Datei ein und starte den Server neu.</p>
  </main>
</body>
</html>
